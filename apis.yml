aid: fueleconomy
name: FuelEconomy.gov
description: >-
  US Department of Energy REST API providing official EPA fuel economy ratings,
  vehicle specifications, CO2 emissions data, and energy cost comparisons for
  all model years from 1984 to present. Administered by Oak Ridge National
  Laboratory for the DOE and EPA, the API offers free, unauthenticated access
  to vehicle lookup menus, per-vehicle MPG records, emissions data, current fuel
  prices, and community-contributed real-world fuel economy data.
type: Index
